openapi: 3.1.0
info:
  title: Construction AI Terminal
  version: 1.0.0

servers:
  - url: https://construction-ai-terminal.toddbridgeford.workers.dev

paths:
  /health:
    get:
      operationId: health
      summary: Health check
      responses:
        "200":
          description: OK

  /fred/observations:
    get:
      operationId: getFred
      parameters:
        - name: series_id
          in: query
          required: true
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: FRED observations

  /bundle:
    get:
      operationId: macroBundle
      summary: Macro bundle

  /signal:
    get:
      operationId: macroSignal
      summary: Construction macro signal

/regime:
  get:
    operationId: macroRegime
    summary: Determine macro regime

/liquidity:
  get:
    operationId: macroLiquidity
    summary: Credit liquidity state

/construction-index:
  get:
    operationId: constructionIndex
    summary: Construction cycle strength

/risk-score:
  get:
    operationId: macroRiskScore
    summary: Combined macro risk score
      
