              schema:
                "$ref": "#/components/schemas/ConstructionScenariosResponse"
  "/construction/watchlist":
    get:
      operationId: constructionWatchlist
      summary: Deterministic operator watchlist alerts
      responses:
        '200':
          description: Construction watchlist response
          content:
            application/json:
