---
openapi: 3.1.0
info:
  title: Construction AI Terminal
  version: 1.1.0
  description: Canonical API for the construction-ai Cloudflare Worker (no /terminal;
    Action matches live routes).
x-endpoint-groups:
  canonical_public_product_endpoints:
  - /construction/terminal
  - /construction/dashboard
  - /construction/morning-brief
  - /construction/alerts
  - /construction/forecast
  - /construction/heatmap
  - /construction/watchlist/custom
  - /construction/settings
  deprecated_compatibility_aliases:
  - /
  - /ytd/commercial
  - /ytd/housing
  - /ytd/summary
  - /construction/settings/active-profile
  lower_level_advanced_model_endpoints:
  - /signal
  - /regime
  - /liquidity
  - /construction-index
  - /risk-score
  - /construction/power
  - /construction/nowcast
  - /construction/stress-index
  - /construction/early-warning
  - /construction/capital-flows
  - /construction/migration-index
  - /construction/materials-shock
  - /construction/labor-shock
  - /construction/margin-pressure
  - /construction/bid-intensity
  - /construction/backlog-quality
  - /construction/project-risk
  - /construction/receivables-risk
  - /construction/payment-delay-risk
  - /construction/collections-stress
  - /construction/owner-risk
  - /construction/developer-fragility
  - /construction/lender-pullback-risk
  - /construction/counterparty-quality
  - /construction/metro-concentration-risk
  - /construction/counterparty-concentration-risk
  - /construction/project-mix-exposure
  - /construction/portfolio-risk
servers:
- url: https://construction-ai.toddbridgeford.workers.dev
  description: Cloudflare Worker (canonical)
paths:
  "/":
    get:
      operationId: root
      summary: Root (alias of health)
      deprecated: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/HealthResponse"
  "/health":
    get:
      operationId: health
      summary: Health check
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/HealthResponse"
  "/cpi":
    get:
      operationId: getCpi
      summary: Latest CPI (KV snapshot with FRED fallback)
      responses:
        '200':
          description: CPI response
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/GenericOkObject"
  "/fred/observations":
    get:
      operationId: getFred
      summary: Fetch FRED observations for a single series
      parameters:
      - name: series_id
        in: query
        required: true
        schema:
          type: string
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          minimum: 1
          maximum: 5000
      responses:
        '200':
          description: FRED observations
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/FredObservationsEnvelope"
  "/notion/series":
    get:
      operationId: listNotionSeries
      summary: Query Notion database and return pages/properties (if configured)
      responses:
        '200':
          description: Notion series response
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/GenericOkObject"
  "/bundle":
    get:
      operationId: macroBundle
      summary: Macro bundle
      parameters:
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          minimum: 1
          maximum: 5000
      - name: series
        in: query
        required: false
        description: Optional override comma-separated series IDs (e.g. PERMIT,HOUST)
        schema:
          type: string
      responses:
        '200':
          description: Macro bundle response
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/GenericOkObject"
  "/signal":
    get:
      operationId: macroSignal
      summary: Construction macro signal
      responses:
        '200':
          description: Macro signal response
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/GenericOkObject"
  "/regime":
    get:
      operationId: macroRegime
      summary: Determine macro regime
      responses:
        '200':
          description: Regime response
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/GenericOkObject"
  "/liquidity":
    get:
      operationId: macroLiquidity
      summary: Credit liquidity state
      responses:
        '200':
          description: Liquidity response
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/GenericOkObject"
  "/construction-index":
    get:
      operationId: constructionIndex
      summary: Construction cycle strength
      responses:
        '200':
          description: Construction index response
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/GenericOkObject"
  "/risk-score":
    get:
      operationId: macroRiskScore
      summary: Combined macro risk score
      responses:
        '200':
          description: Risk score response
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/GenericOkObject"
  "/construction/dashboard":
    get:
      operationId: constructionDashboard
      summary: Canonical construction dashboard payload
      responses:
        '200':
          description: Construction dashboard response
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ConstructionDashboardResponse"
  "/construction/terminal":
    get:
      operationId: constructionTerminal
      summary: One-call operator intelligence terminal
      responses:
        '200':
          description: Construction terminal response
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ConstructionTerminalResponse"
  "/construction/power":
    get:
      operationId: constructionPower
      summary: Construction Power Index (pricing/margin leverage by actor)
      responses:
        '200':
          description: Construction power index response
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ConstructionPowerResponse"
  "/construction/heatmap":
    get:
      operationId: constructionHeatmap
      summary: Metro heatmap engine for strongest and weakest markets
      responses:
        '200':
          description: Construction heatmap response
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ConstructionHeatmapResponse"
  "/construction/nowcast":
    get:
      operationId: constructionNowcast
      summary: Forward construction cycle nowcast (6-12 month direction)
      responses:
        '200':
          description: Construction nowcast response
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ConstructionNowcastResponse"
  "/construction/forecast":
    get:
      operationId: constructionForecast
      summary: Forecasted strongest and weakest construction markets over next 12
        months
      responses:
        '200':
          description: Construction forecast response
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ConstructionForecastResponse"
  "/construction/market-radar":
    get:
      operationId: constructionMarketRadar
      summary: Hottest and weakest construction markets
      responses:
        '200':
          description: Construction market radar response
          content:
