openapi: 3.1.0
info:
  title: Construction AI Terminal API
  version: 2.0.0
servers:
  - url: https://toddbridgeford.workers.dev
paths:
  /health:
    get:
      operationId: health
      responses:
        '200':
          description: Health check
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  service: { type: string }
                additionalProperties: true
  /cpi:
    get:
      operationId: getCpi
      parameters:
        - in: query
          name: location
          required: true
          schema:
            type: string
      responses:
        '200':
          description: CPI snapshot
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CpiSnapshot'
  /market:
    get:
      operationId: getMarket
      parameters:
        - in: query
          name: location
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Market snapshot
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MarketSnapshot'
  /rank/metros:
    get:
      operationId: getMetroRank
      responses:
        '200':
          description: Metro leaderboard
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LeaderboardSnapshot'
components:
  schemas:
    CpiSnapshot:
      type: object
      properties:
        market: { type: string }
        headline_cpi: { type: number }
        zone: { type: string }
        delta_3m: { type: number }
        components:
          type: object
          properties: {}
          additionalProperties: true
        generated_at_utc: { type: string, format: date-time }
      additionalProperties: true
    MarketSnapshot:
      type: object
      properties:
        market: { type: string }
        generated_at_utc: { type: string, format: date-time }
        cpi:
          $ref: '#/components/schemas/CpiSnapshot'
        market_signals:
          type: object
          properties: {}
          additionalProperties: true
      additionalProperties: true
    LeaderboardSnapshot:
      type: object
      properties:
        generated_at_utc: { type: string, format: date-time }
        cron:
          oneOf:
            - type: string
            - type: 'null'
        markets:
          type: array
          items:
            type: object
            properties:
              rank: { type: integer }
              market: { type: string }
              headline_cpi: { type: number }
              zone: { type: string }
              delta_3m: { type: number }
            additionalProperties: true
      additionalProperties: true
