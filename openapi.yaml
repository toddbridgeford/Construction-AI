      - name: year
        in: query
        required: false
        schema:
          type: integer
      responses:
        '200':
          description: YTD/PYTD housing response
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/SpendingYtdResponse"
  "/ytd/summary":
    get:
      operationId: ytdSummaryLegacy
      summary: Deprecated compatibility alias for /spending/ytd/summary
      deprecated: true
      parameters:
      - name: year
        in: query
        required: false
        schema:
          type: integer
      responses:
        '200':
          description: YTD/PYTD summary response
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/SpendingYtdSummaryResponse"
  "/construction/stress-index":
    get:
      operationId: constructionStressIndex
      summary: Deterministic construction stress index
      responses:
        '200':
          description: Deterministic construction stress index response
          content:
            application/json:
              schema:
