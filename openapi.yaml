      responses:
        '200':
          description: Deterministic portfolio risk model response
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ConstructionPortfolioRiskResponse"
components:
  schemas:
    GenericOkObject:
      type: object
      description: Generic JSON response (explicit core fields + arbitrary payload).
      properties:
        ok:
          type: boolean
        ts:
          type: string
        service:
          type: string
      required:
      - ok
      additionalProperties: true
    ErrorEnvelope:
      type: object
      properties:
        ok:
          type: boolean
        ts:
          type: string
        service:
          type: string
        error:
          type: object
          properties:
            code:
              type: string
            message:
              type: string
          required:
          - code
          - message
      required:
      - ok
      - ts
      - service
      - error
      additionalProperties: true
    HealthResponse:
      type: object
      description: Health check response.
      properties:
        ok:
          type: boolean
        service:
          type: string
        ts:
          type: string
        git_sha:
          anyOf:
          - type: string
          - type: 'null'
        has_kv:
          type: boolean
        has_fred_key:
          type: boolean
      required:
      - ok
      - service
      - ts
      additionalProperties: true
    FredObservation:
      type: object
      properties:
        date:
          type: string
        value:
          type: string
      required:
      - date
      - value
      additionalProperties: true
    FredObservationsResponse:
      type: object
      properties:
        realtime_start:
          type: string
        realtime_end:
          type: string
        observation_start:
          type: string
        observation_end:
          type: string
        sort_order:
          type: string
        count:
          type: integer
        limit:
          type: integer
        observations:
          type: array
          items:
            "$ref": "#/components/schemas/FredObservation"
      required:
      - observations
      additionalProperties: true
    FredObservationsEnvelope:
      type: object
      properties:
        ok:
          type: boolean
        source:
          type: string
        series_id:
          type: string
        limit:
          type: integer
        data:
          "$ref": "#/components/schemas/FredObservationsResponse"
      required:
      - ok
      - data
      additionalProperties: true
    ConstructionDashboardResponse:
      type: object
      properties:
        ok:
          type: boolean
        ts:
          type: string
        service:
          type: string
        dashboard:
          type: object
          properties:
            cpi:
              type: object
              additionalProperties: true
            signal:
              type: object
              properties:
                signal:
                  type: string
                confidence:
                  type: number
                regime:
                  type: string
                risk_level:
                  type: string
              required:
              - signal
              - confidence
              - regime
              - risk_level
              additionalProperties: true
            regime:
              type: object
              properties:
                regime:
                  type: string
                confidence:
                  type: number
              required:
              - regime
              - confidence
              additionalProperties: true
            liquidity:
              type: object
              properties:
                liquidity_score:
                  anyOf:
                  - type: number
                  - type: 'null'
                liquidity_state:
                  type: string
                mortgage_rate:
                  anyOf:
                  - type: number
                  - type: 'null'
                fed_funds:
                  anyOf:
                  - type: number
                  - type: 'null'
              required:
              - liquidity_score
              - liquidity_state
