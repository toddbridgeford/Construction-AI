  "/construction/recession-probability":
    get:
      operationId: constructionRecessionProbability
      summary: Deterministic next-12-month slowdown probability
      responses:
        '200':
          description: Construction recession probability response
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/RecessionProbabilityResponse"
  "/spending/ytd":
    get:
      operationId: spendingYtd
      summary: Commercial or housing YTD vs PYTD using FRED SAAR monthly-equivalent
        totals
      parameters:
      - name: segment
        in: query
        required: true
        schema:
          type: string
          enum:
          - commercial
          - housing
      - name: year
        in: query
        required: false
        schema:
          type: integer
      responses:
        '200':
          description: YTD/PYTD response
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/SpendingYtdResponse"
  "/spending/ytd/summary":
    get:
      operationId: spendingYtdSummary
      summary: Combined commercial + housing YTD/PYTD response
      parameters:
      - name: year
        in: query
        required: false
        schema:
          type: integer
      responses:
        '200':
          description: YTD/PYTD summary response
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/SpendingYtdSummaryResponse"
  "/ytd/commercial":
    get:
      operationId: ytdCommercialLegacy
      summary: Deprecated compatibility alias for /spending/ytd?segment=commercial
      deprecated: true
      parameters:
      - name: year
        in: query
        required: false
        schema:
          type: integer
      responses:
        '200':
          description: YTD/PYTD commercial response
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/SpendingYtdResponse"
  "/ytd/housing":
    get:
