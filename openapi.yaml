                "$ref": "#/components/schemas/ConstructionWatchlistResponse"
  "/construction/watchlist/custom":
    get:
      operationId: constructionWatchlistCustom
      summary: Settings-aware custom watchlist alerts
      responses:
        '200':
          description: Construction custom watchlist response
          content:
            application/json:
