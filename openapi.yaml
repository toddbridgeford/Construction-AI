openapi: 3.1.0
info:
  title: Construction AI Terminal
  version: "1.0.6"
  description: Canonical API for the construction-ai Cloudflare Worker (no /terminal; Action matches live routes).

servers:
  - url: https://construction-ai.toddbridgeford.workers.dev
    description: Cloudflare Worker (canonical)

paths:
  /:
    get:
      operationId: root
      summary: Root (alias of health)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /health:
    get:
      operationId: health
      summary: Health check
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /cpi:
    get:
      operationId: getCpi
      summary: Latest CPI (KV snapshot with FRED fallback)
      responses:
        "200":
          description: CPI response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericOkObject"

  /fred/observations:
    get:
      operationId: getFred
      summary: Fetch FRED observations for a single series
      parameters:
        - name: series_id
          in: query
          required: true
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 5000
      responses:
        "200":
          description: FRED observations
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FredObservationsEnvelope"

  /notion/series:
    get:
      operationId: listNotionSeries
      summary: Query Notion database and return pages/properties (if configured)
      responses:
        "200":
          description: Notion series response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericOkObject"

  /bundle:
    get:
      operationId: macroBundle
      summary: Macro bundle
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 5000
        - name: series
          in: query
          required: false
          description: Optional override comma-separated series IDs (e.g. PERMIT,HOUST)
          schema:
            type: string
      responses:
        "200":
          description: Macro bundle response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericOkObject"

  /signal:
    get:
      operationId: macroSignal
      summary: Construction macro signal
      responses:
        "200":
          description: Macro signal response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericOkObject"

  /regime:
    get:
      operationId: macroRegime
      summary: Determine macro regime
      responses:
        "200":
          description: Regime response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericOkObject"

  /liquidity:
    get:
      operationId: macroLiquidity
      summary: Credit liquidity state
      responses:
        "200":
          description: Liquidity response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericOkObject"

  /construction-index:
    get:
      operationId: constructionIndex
      summary: Construction cycle strength
      responses:
        "200":
          description: Construction index response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericOkObject"

  /risk-score:
    get:
      operationId: macroRiskScore
      summary: Combined macro risk score
      responses:
        "200":
          description: Risk score response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericOkObject"

  /construction/dashboard:
    get:
      operationId: constructionDashboard
      summary: Canonical construction dashboard payload
      responses:
        "200":
          description: Construction dashboard response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConstructionDashboardResponse"

  /construction/terminal:
    get:
      operationId: constructionTerminal
      summary: One-call operator intelligence terminal
      responses:
        "200":
          description: Construction terminal response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConstructionTerminalResponse"

  /construction/market-radar:
    get:
      operationId: constructionMarketRadar
      summary: Hottest and weakest construction markets
      responses:
        "200":
          description: Construction market radar response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConstructionMarketRadarResponse"

  /construction/morning-brief:
    get:
      operationId: constructionMorningBrief
      summary: Daily operator-grade construction morning briefing
      responses:
        "200":
          description: Construction morning brief response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConstructionMorningBriefResponse"

  /construction/alerts:
    get:
      operationId: constructionAlerts
      summary: Deterministic active construction alert cards
      responses:
        "200":
          description: Construction alerts response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConstructionAlertsResponse"

  /construction/recession-probability:
    get:
      operationId: constructionRecessionProbability
      summary: Deterministic next-12-month slowdown probability
      responses:
        "200":
          description: Construction recession probability response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecessionProbabilityResponse"

  /spending/ytd:
    get:
      operationId: spendingYtd
      summary: Commercial or housing YTD vs PYTD using FRED SAAR monthly-equivalent totals
      parameters:
        - name: segment
          in: query
          required: true
          schema:
            type: string
            enum:
              - commercial
              - housing
        - name: year
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: YTD/PYTD response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SpendingYtdResponse"

  /spending/ytd/summary:
    get:
      operationId: spendingYtdSummary
      summary: Combined commercial + housing YTD/PYTD response
      parameters:
        - name: year
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: YTD/PYTD summary response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SpendingYtdSummaryResponse"

components:
  schemas:
    GenericOkObject:
      type: object
      description: Generic JSON response (explicit core fields + arbitrary payload).
      properties:
        ok:
          type: boolean
        ts:
          type: string
        service:
          type: string
      required:
        - ok
      additionalProperties: true

    ErrorEnvelope:
      type: object
      properties:
        ok:
          type: boolean
        ts:
          type: string
        service:
          type: string
        error:
          type: object
          properties:
            code:
              type: string
            message:
              type: string
          required:
            - code
            - message
      required:
        - ok
        - ts
        - service
        - error
      additionalProperties: true

    HealthResponse:
      type: object
      description: Health check response.
      properties:
        ok:
          type: boolean
        service:
          type: string
        ts:
          type: string
        git_sha:
          anyOf:
            - type: string
            - type: "null"
        has_kv:
          type: boolean
        has_fred_key:
          type: boolean
      required:
        - ok
        - service
        - ts
      additionalProperties: true

    FredObservation:
      type: object
      properties:
        date:
          type: string
        value:
          type: string
      required:
        - date
        - value
      additionalProperties: true

    FredObservationsResponse:
      type: object
      properties:
        realtime_start:
          type: string
        realtime_end:
          type: string
        observation_start:
          type: string
        observation_end:
          type: string
        sort_order:
          type: string
        count:
          type: integer
        limit:
          type: integer
        observations:
          type: array
          items:
            $ref: "#/components/schemas/FredObservation"
      required:
        - observations
      additionalProperties: true

    FredObservationsEnvelope:
      type: object
      properties:
        ok:
          type: boolean
        source:
          type: string
        series_id:
          type: string
        limit:
          type: integer
        data:
          $ref: "#/components/schemas/FredObservationsResponse"
      required:
        - ok
        - data
      additionalProperties: true

    ConstructionDashboardResponse:
      type: object
      properties:
        ok:
          type: boolean
        ts:
          type: string
        service:
          type: string
        dashboard:
          type: object
          properties:
            cpi:
              type: object
              additionalProperties: true
            signal:
              type: object
              properties:
                signal:
                  type: string
                confidence:
                  type: number
                regime:
                  type: string
                risk_level:
                  type: string
              required:
                - signal
                - confidence
                - regime
                - risk_level
              additionalProperties: true
            regime:
              type: object
              properties:
                regime:
                  type: string
                confidence:
                  type: number
              required:
                - regime
                - confidence
              additionalProperties: true
            liquidity:
              type: object
              properties:
                liquidity_score:
                  anyOf:
                    - type: number
                    - type: "null"
                liquidity_state:
                  type: string
                mortgage_rate:
                  anyOf:
                    - type: number
                    - type: "null"
                fed_funds:
                  anyOf:
                    - type: number
                    - type: "null"
              required:
                - liquidity_score
                - liquidity_state
                - mortgage_rate
                - fed_funds
              additionalProperties: true
            risk:
              type: object
              properties:
                risk_score:
                  anyOf:
                    - type: number
                    - type: "null"
                risk_level:
                  type: string
                inflation_trend_pct:
                  anyOf:
                    - type: number
                    - type: "null"
              required:
                - risk_score
                - risk_level
                - inflation_trend_pct
              additionalProperties: true
            construction:
              type: object
              properties:
                construction_index:
                  anyOf:
                    - type: number
                    - type: "null"
                construction_trend:
                  type: string
              required:
                - construction_index
                - construction_trend
              additionalProperties: true
            spending_summary:
              $ref: "#/components/schemas/SpendingYtdSummaryResponse"
          required:
            - signal
            - regime
            - liquidity
            - risk
          additionalProperties: true
      required:
        - ok
        - ts
        - service
        - dashboard
      additionalProperties: true

    ConstructionSubsectionError:
      type: object
      properties:
        ok:
          type: boolean
        error:
          type: object
          properties:
            code:
              type: string
            message:
              type: string
            details:
              type: object
              additionalProperties: true
          required:
            - code
            - message
          additionalProperties: true
      required:
        - ok
        - error
      additionalProperties: true

    ConstructionTerminalResponse:
      type: object
      properties:
        ok:
          type: boolean
        ts:
          type: string
        service:
          type: string
        terminal:
          type: object
          properties:
            signal:
              oneOf:
                - type: object
                  properties:
                    signal:
                      type: string
                  required:
                    - signal
                  additionalProperties: true
                - $ref: "#/components/schemas/ConstructionSubsectionError"
            regime:
              oneOf:
                - type: object
                  properties:
                    regime:
                      type: string
                  required:
                    - regime
                  additionalProperties: true
                - $ref: "#/components/schemas/ConstructionSubsectionError"
            liquidity:
              oneOf:
                - type: object
                  properties:
                    liquidity_state:
                      type: string
                  required:
                    - liquidity_state
                  additionalProperties: true
                - $ref: "#/components/schemas/ConstructionSubsectionError"
            risk:
              oneOf:
                - type: object
                  properties:
                    risk_level:
                      type: string
                  required:
                    - risk_level
                  additionalProperties: true
                - $ref: "#/components/schemas/ConstructionSubsectionError"
            construction_index:
              oneOf:
                - type: number
                - type: "null"
                - $ref: "#/components/schemas/ConstructionSubsectionError"
            spending:
              oneOf:
                - type: object
                  properties:
                    ok:
                      type: boolean
                    commercial:
                      $ref: "#/components/schemas/SpendingYtdResponse"
                    housing:
                      $ref: "#/components/schemas/SpendingYtdResponse"
                  required:
                    - ok
                    - commercial
                    - housing
                  additionalProperties: true
                - $ref: "#/components/schemas/ConstructionSubsectionError"
            cycle_interpretation:
              type: string
            operator_actions:
              type: object
              properties:
                gc:
                  type: string
                subcontractor:
                  type: string
                developer:
                  type: string
                lender:
                  type: string
              required:
                - gc
                - subcontractor
                - developer
                - lender
            alerts:
              type: array
              items:
                $ref: "#/components/schemas/AlertCard"
            recession_probability:
              type: object
              properties:
                next_12_months:
                  type: number
                trend:
                  type: string
                  enum:
                    - rising
                    - stable
                    - falling
                explanation:
                  type: string
              required:
                - next_12_months
                - trend
                - explanation
              additionalProperties: false
          required:
            - signal
            - regime
            - liquidity
            - risk
            - construction_index
            - spending
            - cycle_interpretation
            - operator_actions
            - alerts
            - recession_probability
          additionalProperties: true
      required:
        - ok
        - ts
        - service
        - terminal
      additionalProperties: true

    ConstructionMarketItem:
      type: object
      properties:
        market:
          type: string
        score:
          type: number
        regime:
          type: string
        signal:
          type: string
        note:
          type: string
      required:
        - market
        - score
        - regime
        - signal
        - note
      additionalProperties: false

    ConstructionMarketRadarResponse:
      type: object
      properties:
        ok:
          type: boolean
        ts:
          type: string
        service:
          type: string
        radar:
          oneOf:
            - type: object
              properties:
                hottest_markets:
                  type: array
                  items:
                    $ref: "#/components/schemas/ConstructionMarketItem"
                weakest_markets:
                  type: array
                  items:
                    $ref: "#/components/schemas/ConstructionMarketItem"
                summary:
                  type: object
                  properties:
                    top_strength_theme:
                      type: string
                    top_weakness_theme:
                      type: string
                  required:
                    - top_strength_theme
                    - top_weakness_theme
                  additionalProperties: false
              required:
                - hottest_markets
                - weakest_markets
                - summary
              additionalProperties: false
            - $ref: "#/components/schemas/ConstructionSubsectionError"
      required:
        - ok
        - ts
        - service
        - radar
      additionalProperties: true

    AlertCard:
      type: object
      properties:
        code:
          type: string
        severity:
          type: string
          enum:
            - high
            - medium
            - low
        headline:
          type: string
        explanation:
          type: string
      required:
        - code
        - severity
        - headline
        - explanation
      additionalProperties: false

    ConstructionAlertsResponse:
      type: object
      properties:
        ok:
          type: boolean
        ts:
          type: string
        service:
          type: string
        alerts:
          type: array
          items:
            $ref: "#/components/schemas/AlertCard"
      required:
        - ok
        - ts
        - service
        - alerts
      additionalProperties: true

    RecessionProbabilityResponse:
      type: object
      properties:
        ok:
          type: boolean
        ts:
          type: string
        service:
          type: string
        recession_probability:
          type: object
          properties:
            next_12_months:
              type: number
            trend:
              type: string
              enum:
                - rising
                - stable
                - falling
            explanation:
              type: string
          required:
            - next_12_months
            - trend
            - explanation
          additionalProperties: false
      required:
        - ok
        - ts
        - service
        - recession_probability
      additionalProperties: true

    ConstructionMorningBriefResponse:
      type: object
      properties:
        ok:
          type: boolean
        ts:
          type: string
        service:
          type: string
        brief:
          type: object
          properties:
            title:
              type: string
            market_signal:
              type: object
              properties:
                signal:
                  type: string
                regime:
                  type: string
                liquidity_state:
                  type: string
                risk_level:
                  type: string
                construction_index:
                  anyOf:
                    - type: number
                    - type: "null"
              required:
                - signal
                - regime
                - liquidity_state
                - risk_level
                - construction_index
              additionalProperties: false
            spending:
              type: object
              properties:
                commercial:
                  type: object
                  additionalProperties: true
                housing:
                  type: object
                  additionalProperties: true
                takeaway:
                  type: string
              required:
                - commercial
                - housing
                - takeaway
              additionalProperties: false
            market_radar:
              oneOf:
                - type: object
                  properties:
                    hottest_markets:
                      type: array
                      items:
                        $ref: "#/components/schemas/ConstructionMarketItem"
                    weakest_markets:
                      type: array
                      items:
                        $ref: "#/components/schemas/ConstructionMarketItem"
                    summary:
                      type: object
                      properties:
                        top_strength_theme:
                          type: string
                        top_weakness_theme:
                          type: string
                      required:
                        - top_strength_theme
                        - top_weakness_theme
                      additionalProperties: false
                  required:
                    - hottest_markets
                    - weakest_markets
                    - summary
                  additionalProperties: false
                - $ref: "#/components/schemas/ConstructionSubsectionError"
            operator_guidance:
              type: object
              properties:
                gc:
                  type: string
                subcontractor:
                  type: string
                developer:
                  type: string
                lender:
                  type: string
              required:
                - gc
                - subcontractor
                - developer
                - lender
              additionalProperties: false
          required:
            - title
            - market_signal
            - spending
            - market_radar
            - operator_guidance
          additionalProperties: false
      required:
        - ok
        - ts
        - service
        - brief
      additionalProperties: true

    SpendingObservation:
      type: object
      properties:
        date:
          type: string
        value_saar:
          type: string
        value_monthly_equiv:
          type: number
      required:
        - date
        - value_saar
        - value_monthly_equiv
      additionalProperties: false

    SpendingYtdResponse:
      type: object
      properties:
        ok:
          type: boolean
        ts:
          type: string
        service:
          type: string
        segment:
          type: string
          enum:
            - commercial
            - housing
        series_id:
          type: string
          enum:
            - PNRESCONS
            - PRRESCONS
        year:
          type: integer
        latest_observation_date:
          type: string
        latest_observation:
          $ref: "#/components/schemas/SpendingObservation"
        months_included:
          type: array
          items:
            type: string
        ytd_monthly_equiv_musd:
          type: number
        pytd_monthly_equiv_musd:
          type: number
        pct_change_ytd_vs_pytd:
          anyOf:
            - type: number
            - type: "null"
        notes:
          type: array
          items:
            type: string
        raw:
          type: object
          properties:
            ytd_observations:
              type: array
              items:
                $ref: "#/components/schemas/SpendingObservation"
            pytd_observations:
              type: array
              items:
                $ref: "#/components/schemas/SpendingObservation"
          required:
            - ytd_observations
            - pytd_observations
      required:
        - ok
        - ts
        - service
        - segment
        - series_id
        - year
        - latest_observation_date
        - latest_observation
        - months_included
        - ytd_monthly_equiv_musd
        - pytd_monthly_equiv_musd
        - pct_change_ytd_vs_pytd
        - raw
      additionalProperties: true

    SpendingYtdSummaryResponse:
      type: object
      properties:
        ok:
          type: boolean
        ts:
          type: string
        service:
          type: string
        year:
          type: integer
        summary:
          type: object
          properties:
            commercial:
              $ref: "#/components/schemas/SpendingYtdResponse"
            housing:
              $ref: "#/components/schemas/SpendingYtdResponse"
          required:
            - commercial
            - housing
      required:
        - ok
        - ts
        - service
        - year
        - summary
      additionalProperties: true
