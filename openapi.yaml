  "/construction/early-warning":
    get:
      operationId: constructionEarlyWarning
      summary: Deterministic cycle-risk early warning
      responses:
        '200':
          description: Deterministic cycle-risk early warning response
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ConstructionEarlyWarningResponse"
  "/construction/capital-flows":
    get:
      operationId: constructionCapitalFlows
      summary: Capital allocation posture for operators and lenders
      responses:
        '200':
          description: Capital allocation posture for operators and lenders response
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ConstructionCapitalFlowsResponse"
  "/construction/migration-index":
    get:
      operationId: constructionMigrationIndex
      summary: Structural market migration index from heatmap and forecast
      responses:
        '200':
          description: Structural market migration index from heatmap and forecast
