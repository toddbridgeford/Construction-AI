                "$ref": "#/components/schemas/ConstructionCustomWatchlistResponse"
  "/construction/settings":
    get:
      operationId: constructionSettingsGet
      summary: Read active construction alert settings profile
      responses:
        '200':
          description: Construction settings response
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ConstructionSettingsResponse"
    post:
      operationId: constructionSettingsSave
      summary: Update active construction alert settings profile
      requestBody:
        required: false
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/ConstructionSettingsPatchModel"
      responses:
        '200':
          description: Construction settings write response
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ConstructionSettingsWriteResponse"
  "/construction/settings/defaults":
    get:
      operationId: constructionSettingsDefaults
      summary: Read safe default construction settings
      responses:
        '200':
          description: Construction settings defaults response
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ConstructionSettingsDefaultsResponse"
  "/construction/settings/reset":
    post:
      operationId: constructionSettingsReset
      summary: Reset app-level construction settings to defaults
      responses:
        '200':
          description: Construction settings reset response
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ConstructionSettingsResetResponse"
  "/construction/settings/profiles":
    get:
      operationId: constructionSettingsProfiles
      summary: List saved settings profiles and active profile
      responses:
        '200':
          description: Construction settings profiles response
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ConstructionSettingsProfilesResponse"
    post:
      operationId: constructionSettingsProfilesCreate
      summary: Create a new settings profile (from provided settings or clone active)
      requestBody:
        required: false
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/ConstructionSettingsProfileCreateRequest"
      responses:
        '200':
          description: Construction settings write response
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ConstructionSettingsWriteResponse"
  "/construction/settings/active-profile":
    get:
      operationId: constructionSettingsActiveProfileGet
      summary: Read the active settings profile metadata and resolved settings
      responses:
        '200':
          description: Active settings profile response
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ConstructionSettingsResponse"
    post:
      operationId: constructionSettingsActiveProfileSet
      summary: Set active settings profile by profile_id (backward-compatible endpoint)
      deprecated: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/ConstructionSettingsProfileActionRequest"
      responses:
        '200':
          description: Active settings profile response
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ConstructionSettingsResponse"
  "/construction/settings/profiles/activate":
    post:
      operationId: constructionSettingsProfilesActivate
      summary: Activate a settings profile by profile_id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/ConstructionSettingsProfileActionRequest"
      responses:
        '200':
          description: Construction settings write response
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ConstructionSettingsWriteResponse"
  "/construction/settings/profiles/delete":
    post:
      operationId: constructionSettingsProfilesDelete
      summary: Delete a non-active settings profile by profile_id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/ConstructionSettingsProfileActionRequest"
      responses:
        '200':
          description: Construction settings write response
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ConstructionSettingsWriteResponse"
  "/construction/morning-brief/v2":
    get:
      operationId: constructionMorningBriefV2
      summary: Changed-conditions morning brief with watchlist integration
      responses:
        '200':
          description: Construction morning brief v2 response
          content:
            application/json:
              schema:
