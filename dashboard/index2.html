<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#f4f6fb" />
    <title>Construct Workflow</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="app-header">
        <div>
          <p class="eyebrow">Construction workflow</p>
          <h1>Project Runner</h1>
        </div>
        <button id="refreshBtn" class="ghost-btn" type="button">Refresh</button>
      </header>

      <main id="tabContent" class="tab-content" aria-live="polite"></main>

      <nav class="bottom-tabs" aria-label="Primary">
        <button class="tab-btn active" data-tab="home" type="button">Home</button>
        <button class="tab-btn" data-tab="projects" type="button">Projects</button>
        <button class="tab-btn" data-tab="plans" type="button">Plans</button>
        <button class="tab-btn" data-tab="results" type="button">Results</button>
      </nav>
    </div>

    <script src="./app.js" defer></script>
  </body>
</html>
