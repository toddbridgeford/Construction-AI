openapi: 3.1.0
info:
  title: Construction AI Terminal API
  version: 1.1.0
servers:
  - url: https://toddbridgeford.workers.dev
paths:
  /health:
    get:
      operationId: health
      responses:
        '200':
          description: Health status
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  service: { type: string }
                additionalProperties: true
  /cpi:
    get:
      operationId: getCpiSnapshot
      parameters:
        - in: query
          name: location
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Latest CPI snapshot for market
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CpiSnapshot'
  /market:
    get:
      operationId: getMarketSnapshot
      parameters:
        - in: query
          name: location
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Latest market datapoint snapshot
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MarketSnapshot'
  /rank/metros:
    get:
      operationId: rankMetros
      responses:
        '200':
          description: Leaderboard across markets
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LeaderboardSnapshot'
  /refresh:
    get:
      operationId: refreshMarket
      parameters:
        - in: query
          name: location
          required: false
          schema: { type: string }
        - in: query
          name: token
          required: false
          schema: { type: string }
        - in: header
          name: x-admin-token
          required: false
          schema: { type: string }
      responses:
        '200':
          description: Triggered recompute for one or all markets
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  generated_at_utc: { type: string }
                  market_count: { type: integer }
                  leaderboard_count: { type: integer }
                additionalProperties: true
  /notion/series:
    get:
      operationId: notionSeries
      responses:
        '200':
          description: Notion series list
          content:
            application/json:
              schema:
                type: object
                properties:
                  count: { type: integer }
                  series:
                    type: array
                    items: { type: string }
                additionalProperties: true
  /notion/add:
    post:
      operationId: notionAdd
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties: {}
              additionalProperties: true
      responses:
        '200':
          description: Created Notion page
          content:
            application/json:
              schema:
                type: object
                properties: {}
                additionalProperties: true
  /bundle:
    get:
      operationId: bundle
      parameters:
        - in: query
          name: limit
          schema: { type: integer }
        - in: query
          name: fred
          schema: { type: string }
      responses:
        '200':
          description: FRED bundle
          content:
            application/json:
              schema:
                type: object
                properties:
                  meta:
                    type: object
                    properties:
                      used_override: { type: boolean }
                      series_count: { type: integer }
                    additionalProperties: true
                  fred:
                    type: object
                    properties: {}
                    additionalProperties: true
                additionalProperties: true
  /fred/observations:
    get:
      operationId: fredObservations
      parameters:
        - in: query
          name: series_id
          required: true
          schema: { type: string }
        - in: query
          name: limit
          schema: { type: integer }
        - in: query
          name: sort_order
          schema: { type: string }
        - in: query
          name: observation_start
          schema: { type: string, format: date }
        - in: query
          name: observation_end
          schema: { type: string, format: date }
      responses:
        '200':
          description: FRED observations
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FredObservations'
  /bls/timeseries:
    post:
      operationId: blsTimeseries
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties: {}
              additionalProperties: true
      responses:
        '200':
          description: BLS response
          content:
            application/json:
              schema:
                type: object
                properties: {}
                additionalProperties: true
  /usaspending/awards:
    post:
      operationId: usaspendingAwards
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties: {}
              additionalProperties: true
      responses:
        '200':
          description: USAspending awards
          content:
            application/json:
              schema:
                type: object
                properties: {}
                additionalProperties: true
  /usaspending/awards/count:
    post:
      operationId: usaspendingAwardCount
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties: {}
              additionalProperties: true
      responses:
        '200':
          description: USAspending awards count
          content:
            application/json:
              schema:
                type: object
                properties: {}
                additionalProperties: true
  /alphavantage/quote:
    get:
      operationId: alphaQuote
      parameters:
        - in: query
          name: symbol
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Alpha Vantage quote
          content:
            application/json:
              schema:
                type: object
                properties: {}
                additionalProperties: true
  /alphavantage/daily:
    get:
      operationId: alphaDaily
      parameters:
        - in: query
          name: symbol
          required: true
          schema: { type: string }
        - in: query
          name: outputsize
          schema: { type: string }
        - in: query
          name: datatype
          schema: { type: string }
      responses:
        '200':
          description: Alpha Vantage daily
          content:
            application/json:
              schema:
                type: object
                properties: {}
                additionalProperties: true
            text/csv:
              schema:
                type: string
  /alphavantage/intraday:
    get:
      operationId: alphaIntraday
      parameters:
        - in: query
          name: symbol
          required: true
          schema: { type: string }
        - in: query
          name: interval
          schema: { type: string }
        - in: query
          name: outputsize
          schema: { type: string }
        - in: query
          name: datatype
          schema: { type: string }
      responses:
        '200':
          description: Alpha Vantage intraday
          content:
            application/json:
              schema:
                type: object
                properties: {}
                additionalProperties: true
            text/csv:
              schema:
                type: string
  /alphavantage/news:
    get:
      operationId: alphaNews
      parameters:
        - in: query
          name: tickers
          schema: { type: string }
        - in: query
          name: topics
          schema: { type: string }
        - in: query
          name: limit
          schema: { type: integer }
      responses:
        '200':
          description: Alpha Vantage news sentiment
          content:
            application/json:
              schema:
                type: object
                properties: {}
                additionalProperties: true
  /news/feeds:
    get:
      operationId: newsFeeds
      parameters:
        - in: query
          name: mode
          schema: { type: string }
      responses:
        '200':
          description: News feed list or fetch output
          content:
            application/json:
              schema:
                type: object
                properties:
                  count: { type: integer }
                  results:
                    type: array
                    items:
                      type: object
                      properties:
                        url: { type: string }
                        ok: { type: boolean }
                        status: { type: integer }
                        content_type: { type: [string, 'null'] }
                        text_truncated: { type: string }
                      additionalProperties: true
                additionalProperties: true
components:
  schemas:
    CpiSnapshot:
      type: object
      properties:
        market: { type: string }
        generated_at_utc: { type: string }
        headline_cpi: { type: number }
        zone: { type: string }
        delta_3m: { type: number }
        components:
          type: object
          properties: {}
          additionalProperties: true
        overlays:
          type: object
          properties: {}
          additionalProperties: true
        top_contributors:
          type: array
          items:
            type: object
            properties:
              metric: { type: string }
              component: { type: string }
              contribution: { type: number }
              delta_3m: { type: number }
            additionalProperties: true
        timestamp: { type: string }
      additionalProperties: true
    MarketSnapshot:
      type: object
      properties:
        market: { type: string }
        market_key: { type: string }
        generated_at_utc: { type: string }
        cpi:
          $ref: '#/components/schemas/CpiSnapshot'
        datapoints:
          type: array
          items:
            type: object
            properties: {}
            additionalProperties: true
        meta:
          type: object
          properties:
            total_datapoints: { type: integer }
            successful_datapoints: { type: integer }
            failed_datapoints: { type: integer }
          additionalProperties: true
      additionalProperties: true
    LeaderboardSnapshot:
      type: object
      properties:
        generated_at_utc: { type: string }
        source: { type: string }
        cron: { type: [string, 'null'] }
        markets:
          type: array
          items:
            type: object
            properties:
              rank: { type: integer }
              market: { type: string }
              market_key: { type: string }
              headline_cpi: { type: number }
              delta_3m: { type: number }
              zone: { type: string }
              datapoints: { type: integer }
            additionalProperties: true
      additionalProperties: true
    FredObservations:
      type: object
      properties:
        realtime_start: { type: string }
        realtime_end: { type: string }
        observation_start: { type: string }
        observation_end: { type: string }
        units: { type: string }
        output_type: { type: integer }
        file_type: { type: string }
        order_by: { type: string }
        sort_order: { type: string }
        count: { type: integer }
        offset: { type: integer }
        limit: { type: integer }
        observations:
          type: array
          items:
            type: object
            properties:
              date: { type: string }
              value: { type: string }
            additionalProperties: true
      additionalProperties: true
