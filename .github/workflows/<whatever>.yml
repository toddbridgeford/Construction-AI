- name: Commit changes (only if changed)
  run: |
    set -euo pipefail

    git config --global user.name "github-actions"
    git config --global user.email "actions@github.com"

    git add -A

    if git diff --cached --quiet; then
      echo "No changes to commit"
      exit 0
    fi

    git commit -m "Update dashboard + signal API + markets"

    # Sync with remote before pushing to avoid "fetch first"
    git pull --rebase origin Predictive-Model

    git push origin Predictive-Model
