name: update_dashboard_latest

on:
  workflow_dispatch:
  schedule:
    - cron: "17 12 * * 1-5"

permissions:
  contents: write

jobs:
  build-dashboard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build dashboard_latest.json
        run: node scripts/build_dashboard_latest.mjs

      - name: Commit updated dashboard
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add dashboard_latest.json

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "chore: update dashboard_latest.json"
          git push
