name: Update dashboard_latest.json + signal_api_latest.json + markets (CPI + News + Stocks + SAM + USAspending + EIA)

on:
  workflow_dispatch:
  schedule:
    - cron: "15 13 * * *" # daily (UTC)

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: Predictive-Model
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Ensure output files exist
        run: |
          if [ ! -f dashboard_latest.json ]; then
            echo '{}' > dashboard_latest.json
          fi
          if [ ! -f signal_api_latest.json ]; then
            echo '{}' > signal_api_latest.json
          fi
          mkdir -p dist/markets
          if [ ! -f dist/markets/index.json ]; then
            echo '{}' > dist/markets/index.json
          fi

      - name: Validate Required Files
        run: |
          test -f scripts/build_dashboard_latest.mjs
          test -f scripts/build_signal_api_latest.mjs
          test -f scripts/build_markets_signal_api_latest.mjs
          test -f scripts/package.json
          test -f config/markets.json

      - name: Install script dependencies
        run: npm --prefix scripts install --silent

      - name: Run Dashboard Build Script
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          BLS_API_KEY: ${{ secrets.BLS_API_KEY }}
          CENSUS_API_KEY: ${{ secrets.CENSUS_API_KEY }}

          ALPHAVANTAGE_API_KEY: ${{ secrets.ALPHAVANTAGE_API_KEY }}
          SAM_API_KEY: ${{ secrets.SAM_API_KEY }}
          EIA_API_KEY: ${{ secrets.EIA_API_KEY }}

          # NewsAPI.org
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}

          FRED_OBSERVATION_START: "2020-01-01"
          OUT_PATH: "dashboard_latest.json"

          # Free baseline (GDELT)
          NEWS_LOOKBACK_DAYS: "5"
          NEWS_MAX: "60"

          # NewsAPI Everything (deep research stream)
          NEWSAPI_LOOKBACK_DAYS: "10"
          NEWSAPI_MAX: "80"
          NEWSAPI_QUERY: "(construction OR \"building permits\" OR \"housing starts\" OR \"commercial real estate\" OR \"general contractor\" OR homebuilder OR \"building code\" OR \"land acquisition\" OR \"pre-construction\" OR \"data center\") AND (US OR United States)"
          NEWSAPI_LANGUAGE: "en"
          NEWSAPI_SORTBY: "publishedAt"

          # NewsAPI Top Headlines (executive stream)
          NEWSAPI_TOP_HEADLINES: "true"
          NEWSAPI_COUNTRY: "us"
          NEWSAPI_CATEGORY: "business"
          NEWSAPI_PAGE_SIZE: "30"

          STOCK_TICKERS: "DHI,PHM,LEN,NVR,TOL,HD,LOW,VMC,MLM,BLDR,FBIN,OC,USCR,EXP,CAT,DE,URI,TPC,CRH"
          ALPHAVANTAGE_PRIORITY_TICKERS: "DHI,PHM,LEN,NVR,TOL,BLDR,VMC,MLM,OC,HD,LOW"

          # USAspending
          USASPENDING_LIMIT: "80"
          USASPENDING_NAICS: "23,5413,2373,2371,2362,2382"
          USASPENDING_KEYWORDS: "construction,design-build,general contractor,roofing,HVAC,electrical,plumbing,concrete,civil,road,bridge,data center"

          # EIA series IDs
          EIA_SERIES_IDS: "PET.RWTC.D"
          EIA_MAX_POINTS: "120"
        run: |
          node scripts/build_dashboard_latest.mjs

      - name: Validate dashboard_latest.json parses
        run: |
          node -e "JSON.parse(require('fs').readFileSync('dashboard_latest.json','utf8'))"

      - name: Fail if dashboard missing CPI
        run: |
          node - <<'NODE'
          const fs = require('fs');
          const j = JSON.parse(fs.readFileSync('dashboard_latest.json','utf8'));
          if (typeof j.cpi?.headline !== 'number') {
            console.error("Missing cpi.headline in dashboard_latest.json");
            process.exit(1);
          }
          console.log("Headline CPI:", j.cpi.headline);
          NODE

      - name: Build signal_api_latest.json (Signal API v1)
        env:
          IN_PATH: "dashboard_latest.json"
          OUT_PATH: "signal_api_latest.json"
          REGION_LABEL: "United States"
          REGION_NAME: "National"
        run: |
          node scripts/build_signal_api_latest.mjs

      - name: Validate signal_api_latest.json parses and has version
        run: |
          node - <<'NODE'
          const fs = require('fs');
          const j = JSON.parse(fs.readFileSync('signal_api_latest.json','utf8'));
          if (j?.meta?.version !== 'signal_api_v1') {
            console.error("signal_api_latest.json invalid: meta.version != signal_api_v1");
            process.exit(1);
          }
          console.log("Signal API version:", j.meta.version);
          NODE

      - name: Build multi-market Signal API outputs (v1)
        run: |
          node scripts/build_markets_signal_api_latest.mjs

      - name: Validate markets index exists
        run: |
          test -f dist/markets/index.json
          node -e "JSON.parse(require('fs').readFileSync('dist/markets/index.json','utf8'))"

      - name: Commit changes (if any)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add dashboard_latest.json
          git add signal_api_latest.json
          git add dist/markets/index.json
          git add dist/markets/**/signal_api_latest.json

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "Update dashboard + signal API + markets"
          git push origin Predictive-Model

      - name: Complete job
        run: echo "✅ Done."
