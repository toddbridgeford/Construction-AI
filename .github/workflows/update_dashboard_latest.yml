name: Update dashboard_latest.json (FRED + Ready for BLS/Census)

on:
  workflow_dispatch:
  schedule:
    - cron: "15 13 * * *" # daily (UTC). adjust if you want.

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: Predictive-Model
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Ensure dashboard_latest.json exists
        run: |
          if [ ! -f dashboard_latest.json ]; then
            echo '{}' > dashboard_latest.json
          fi

      - name: Validate Required Files
        run: |
          test -f scripts/build_dashboard_latest.mjs
          test -f config/fred_signals.json
          test -f scripts/package.json

      - name: Install script dependencies
        run: npm --prefix scripts install --silent

      - name: Validate JSON Structure
        run: |
          node -e "JSON.parse(require('fs').readFileSync('config/fred_signals.json','utf8'))"

      - name: Run Build Script
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          BLS_API_KEY: ${{ secrets.BLS_API_KEY }}
          CENSUS_API_KEY: ${{ secrets.CENSUS_API_KEY }}
          FRED_OBSERVATION_START: "2020-01-01"
          OUT_PATH: "dashboard_latest.json"
        run: |
          node scripts/build_dashboard_latest.mjs

      - name: Validate Output JSON
        run: |
          node -e "JSON.parse(require('fs').readFileSync('dashboard_latest.json','utf8'))"

      - name: Fail if dashboard missing CEPS
        run: |
          node - <<'NODE'
          const fs = require('fs');
          const j = JSON.parse(fs.readFileSync('dashboard_latest.json','utf8'));
          if (typeof j.ceps_score !== 'number') {
            console.error("Missing ceps_score in dashboard_latest.json");
            process.exit(1);
          }
          console.log("ceps_score:", j.ceps_score);
          NODE

      - name: Commit changes (if any)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add dashboard_latest.json

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "Update dashboard_latest.json (FRED)"
          git push origin Predictive-Model

      - name: Complete job
        run: echo "✅ Done."
