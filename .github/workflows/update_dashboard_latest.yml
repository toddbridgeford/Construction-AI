name: Update dashboard_latest.json (FRED)

on:
  workflow_dispatch:
  schedule:
    - cron: '0 11 * * 1-5'  # 6AM EST weekdays (adjust as needed)

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Validate Required Files
        run: |
          test -f framework/orchestrators/national_autonomous_run_orchestrator_v1.json
          test -f framework/orchestrators/national_execution_precedence_matrix_v1.json
          test -f config/state_permits.json
          test -f config/msa_permits.json

      - name: Validate JSON Structure
        run: |
          node -e "JSON.parse(require('fs').readFileSync('config/state_permits.json'))"
          node -e "JSON.parse(require('fs').readFileSync('config/msa_permits.json'))"
          node -e "JSON.parse(require('fs').readFileSync('framework/orchestrators/national_autonomous_run_orchestrator_v1.json'))"
          node -e "JSON.parse(require('fs').readFileSync('framework/orchestrators/national_execution_precedence_matrix_v1.json'))"

      - name: Run Build Script
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: node scripts/build_dashboard_latest.mjs

      - name: Validate Output JSON
        run: |
          node -e "JSON.parse(require('fs').readFileSync('dashboard_latest.json'))"

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add dashboard_latest.json
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto-update dashboard_latest.json"
          git push
