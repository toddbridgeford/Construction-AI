name: Update dashboard_latest.json (FRED)

on:
  workflow_dispatch:
  schedule:
    - cron: "15 * * * *"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Validate Required Files
        run: |
          set -e
          test -f scripts/build_dashboard_latest.mjs
          test -f config/state_permits.json
          test -f config/msa_permits.json
          test -f framework/orchestrators/national_autonomous_run_orchestrator_v1.json
          test -f framework/national_execution_precedence_matrix_v1.json
          echo "All required files exist ✅"

      - name: Validate JSON Structure
        run: |
          node -e "JSON.parse(require('fs').readFileSync('config/state_permits.json','utf8'))"
          node -e "JSON.parse(require('fs').readFileSync('config/msa_permits.json','utf8'))"
          node -e "JSON.parse(require('fs').readFileSync('framework/orchestrators/national_autonomous_run_orchestrator_v1.json','utf8'))"
          node -e "JSON.parse(require('fs').readFileSync('framework/national_execution_precedence_matrix_v1.json','utf8'))"
          echo "All JSON files valid ✅"

      - name: Run Build Script
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          FRED_OBSERVATION_START: "2020-01-01"
          OUT_PATH: "dashboard_latest.json"
        run: |
          node scripts/build_dashboard_latest.mjs

      - name: Validate Output JSON
        run: |
          test -f dashboard_latest.json
          node -e "JSON.parse(require('fs').readFileSync('dashboard_latest.json','utf8'))"
          echo "dashboard_latest.json valid ✅"

      - name: Commit changes (if any)
        run: |
          git config user.name "todd-dashboard-bot"
          git config user.email "actions@users.noreply.github.com"

          git add dashboard_latest.json

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "Update dashboard_latest.json (auto)"
          git push
