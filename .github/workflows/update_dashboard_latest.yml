# .github/workflows/update_dashboard_latest.yml
name: Update dashboard + signal API + markets (CPI + News + Stocks + SAM + USAspending + EIA)

on:
  workflow_dispatch:
  schedule:
    - cron: "15 13 * * *" # daily (UTC)

permissions:
  contents: write

# Prevent overlapping runs (e.g., slow API day + schedule overlap)
concurrency:
  group: update-dashboard-latest-predictive-model
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout repo (Predictive-Model)
        uses: actions/checkout@v4
        with:
          ref: Predictive-Model
          fetch-depth: 0

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Log run metadata
        run: |
          set -euo pipefail
          echo "Branch: $(git rev-parse --abbrev-ref HEAD)"
          echo "SHA:    $(git rev-parse --short HEAD)"
          echo "UTC:    $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          node --version
          npm --version

            - name: Add retry helper (exponential backoff)
        run: |
          set -euo pipefail
          cat > /tmp/retry.sh <<'BASH'
          retry () {
            local -r max_attempts="${1:-5}"
            shift || true
            local attempt=1
            local delay=5

            until "$@"; do
              exit_code=$?
              if [ "$attempt" -ge "$max_attempts" ]; then
                echo "❌ Command failed after ${attempt} attempts: $*"
                return "$exit_code"
              fi
              echo "⚠️  Attempt ${attempt}/${max_attempts} failed (exit ${exit_code}). Retrying in ${delay}s: $*"
              sleep "$delay"
              attempt=$((attempt+1))
              delay=$((delay*2))
              if [ "$delay" -gt 90 ]; then delay=90; fi
            done
          }
          export -f retry
          echo "✅ retry() installed"
          BASH

      - name: Ensure output directories exist
        run: |
          set -euo pipefail
          mkdir -p dist/markets
          # do NOT pre-create outputs as {} unless absent; preserve existing files for diffs
          if [ ! -f dashboard_latest.json ]; then echo '{}' > dashboard_latest.json; fi
          if [ ! -f signal_api_latest.json ]; then echo '{}' > signal_api_latest.json; fi
          if [ ! -f dist/markets/index.json ]; then echo '{}' > dist/markets/index.json; fi

      - name: Validate required files exist
        run: |
          set -euo pipefail
          test -f scripts/build_dashboard_latest.mjs
          test -f scripts/build_signal_api_latest.mjs
          test -f scripts/build_markets_signal_api_latest.mjs
          test -f scripts/package.json
          test -f config/markets.json

      - name: Install script dependencies (safe)
        working-directory: scripts
        run: |
          set -euo pipefail
          # Prefer deterministic installs when a lockfile exists
          if [ -f package-lock.json ]; then
            npm ci --silent --no-audit --no-fund
          else
            npm install --silent --no-audit --no-fund
          fi

      - name: Build dashboard_latest.json
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          BLS_API_KEY: ${{ secrets.BLS_API_KEY }}
          CENSUS_API_KEY: ${{ secrets.CENSUS_API_KEY }}

          ALPHAVANTAGE_API_KEY: ${{ secrets.ALPHAVANTAGE_API_KEY }}
          SAM_API_KEY: ${{ secrets.SAM_API_KEY }}
          EIA_API_KEY: ${{ secrets.EIA_API_KEY }}

          # NewsAPI.org
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}

          FRED_OBSERVATION_START: "2020-01-01"
          OUT_PATH: "dashboard_latest.json"

          # Free baseline (GDELT)
          NEWS_LOOKBACK_DAYS: "5"
          NEWS_MAX: "60"

          # NewsAPI Everything (deep research stream)
          NEWSAPI_LOOKBACK_DAYS: "10"
          NEWSAPI_MAX: "80"
          NEWSAPI_QUERY: "(construction OR \"building permits\" OR \"housing starts\" OR \"commercial real estate\" OR \"general contractor\" OR homebuilder OR \"building code\" OR \"land acquisition\" OR \"pre-construction\" OR \"data center\") AND (US OR United States)"
          NEWSAPI_LANGUAGE: "en"
          NEWSAPI_SORTBY: "publishedAt"

          # NewsAPI Top Headlines (executive stream)
          NEWSAPI_TOP_HEADLINES: "true"
          NEWSAPI_COUNTRY: "us"
          NEWSAPI_CATEGORY: "business"
          NEWSAPI_PAGE_SIZE: "30"

          STOCK_TICKERS: "DHI,PHM,LEN,NVR,TOL,HD,LOW,VMC,MLM,BLDR,FBIN,OC,USCR,EXP,CAT,DE,URI,TPC,CRH"
          ALPHAVANTAGE_PRIORITY_TICKERS: "DHI,PHM,LEN,NVR,TOL,BLDR,VMC,MLM,OC,HD,LOW"

          # USAspending
          USASPENDING_LIMIT: "80"
          USASPENDING_NAICS: "23,5413,2373,2371,2362,2382"
          USASPENDING_KEYWORDS: "construction,design-build,general contractor,roofing,HVAC,electrical,plumbing,concrete,civil,road,bridge,data center"

          # EIA series IDs
          EIA_SERIES_IDS: "PET.RWTC.D"
          EIA_MAX_POINTS: "120"
        run: |
          set -euo pipefail
          node scripts/build_dashboard_latest.mjs

      - name: Validate dashboard_latest.json (parse + required fields + non-empty)
        run: |
          set -euo pipefail
          test -s dashboard_latest.json
          node - <<'NODE'
          const fs = require('fs');
          const j = JSON.parse(fs.readFileSync('dashboard_latest.json','utf8'));

          // Hard gates
          if (typeof j?.cpi?.headline !== 'number') {
            console.error("Missing cpi.headline in dashboard_latest.json");
            process.exit(1);
          }
          if (!j?.generated_at && !j?.generated_at_utc && !j?.generated_at) {
            // Not fatal if schema differs, but your file sets generated_at
            console.warn("Warn: generated_at not found (non-fatal).");
          }

          console.log("OK: Headline CPI =", j.cpi.headline);
          console.log("OK: Zone =", j.cpi.zone);
          console.log("OK: Δ3m =", j.cpi.delta_3m);
          NODE

      - name: Build signal_api_latest.json (Signal API v1)
        env:
          IN_PATH: "dashboard_latest.json"
          OUT_PATH: "signal_api_latest.json"
          REGION_LABEL: "United States"
          REGION_NAME: "National"
        run: |
          set -euo pipefail
          node scripts/build_signal_api_latest.mjs

      - name: Validate signal_api_latest.json (parse + version + non-empty)
        run: |
          set -euo pipefail
          test -s signal_api_latest.json
          node - <<'NODE'
          const fs = require('fs');
          const j = JSON.parse(fs.readFileSync('signal_api_latest.json','utf8'));
          if (j?.meta?.version !== 'signal_api_v1') {
            console.error("signal_api_latest.json invalid: meta.version != signal_api_v1");
            process.exit(1);
          }
          console.log("OK: Signal API version =", j.meta.version);
          NODE

      - name: Build multi-market Signal API outputs (v1)
        run: |
          set -euo pipefail
          node scripts/build_markets_signal_api_latest.mjs

      - name: Validate markets outputs
        run: |
          set -euo pipefail
          test -f dist/markets/index.json
          test -s dist/markets/index.json
          node -e "JSON.parse(require('fs').readFileSync('dist/markets/index.json','utf8'))"
          # Ensure at least one market output exists (if your config defines markets)
          count=$(ls -1 dist/markets/*/signal_api_latest.json 2>/dev/null | wc -l | tr -d ' ')
          echo "Markets signal_api_latest.json count: $count"
          if [ "$count" -lt 1 ]; then
            echo "Warning: No market outputs were produced (non-fatal). Check config/markets.json."
          fi

      - name: Commit changes (only if changed)
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add dashboard_latest.json
          git add signal_api_latest.json
          git add dist/markets/index.json
          git add dist/markets/**/signal_api_latest.json || true

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "Update dashboard + signal API + markets"
          git push origin Predictive-Model

      - name: Complete job
        run: |
          set -euo pipefail
          echo "✅ Done."
