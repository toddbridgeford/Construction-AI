name: Deploy Cloudflare Worker

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'src/worker.js'
      - 'wrangler.toml'
      - '.github/workflows/deploy_cloudflare_worker.yml'

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      WRANGLER_VERSION: 4.70.0
      WORKER_NAME: construction-ai-terminal
      WORKER_BASE_URL: https://construction-ai-terminal.workers.dev
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Worker syntax
        run: |
          set -euo pipefail
          test -f src/worker.js
          test -f wrangler.toml
          node --check src/worker.js

      - name: Preflight required Cloudflare configuration
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_KV_NAMESPACE_ID: ${{ secrets.CLOUDFLARE_KV_NAMESPACE_ID }}
          CLOUDFLARE_KV_PREVIEW_NAMESPACE_ID: ${{ secrets.CLOUDFLARE_KV_PREVIEW_NAMESPACE_ID }}
        run: |
          set -euo pipefail
          missing=0
          for key in CLOUDFLARE_API_TOKEN CLOUDFLARE_ACCOUNT_ID CLOUDFLARE_KV_NAMESPACE_ID; do
            if [ -z "${!key:-}" ]; then
              echo "ERROR: Missing required secret ${key}."
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            echo "Deployment stopped. Configure required Cloudflare secrets in GitHub Actions."
            exit 1
          fi

      - name: Build CI wrangler config
        env:
          CLOUDFLARE_KV_NAMESPACE_ID: ${{ secrets.CLOUDFLARE_KV_NAMESPACE_ID }}
          CLOUDFLARE_KV_PREVIEW_NAMESPACE_ID: ${{ secrets.CLOUDFLARE_KV_PREVIEW_NAMESPACE_ID }}
        run: |
          set -euo pipefail
          preview_id="${CLOUDFLARE_KV_PREVIEW_NAMESPACE_ID:-$CLOUDFLARE_KV_NAMESPACE_ID}"
          cat > wrangler.ci.toml <<EOF
          name = "construction-ai-terminal"
          main = "src/index.js"
          compatibility_date = "2026-01-01"

          [[kv_namespaces]]
          binding = "CPI_SNAPSHOTS"
          id = "${CLOUDFLARE_KV_NAMESPACE_ID}"
          preview_id = "${preview_id}"
          EOF

      - name: Deploy to Cloudflare
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          GIT_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          attempt=1
          max_attempts=5
          delay=2
          while [ "$attempt" -le "$max_attempts" ]; do
            echo "Deploy attempt ${attempt}/${max_attempts}"
            if npx --yes wrangler@${WRANGLER_VERSION} deploy \
              --config wrangler.ci.toml \
              --name "${WORKER_NAME}" \
              --var "GIT_SHA:${GIT_SHA}"; then
              echo "Deploy succeeded on attempt ${attempt}."
              break
            fi
            if [ "$attempt" -eq "$max_attempts" ]; then
              echo "Deployment failed after ${max_attempts} attempts."
              exit 1
            fi
            echo "Deploy failed. Retrying in ${delay}s..."
            sleep "$delay"
            delay=$((delay * 2))
            attempt=$((attempt + 1))
          done

      - name: Post-deploy health/version checks (non-blocking)
        run: |
          set +e
          for endpoint in health version; do
            url="${WORKER_BASE_URL}/${endpoint}"
            echo "Checking ${url}"
            if ! curl --fail --show-error --silent --max-time 20 "${url}"; then
              echo "WARNING: Unable to fetch ${url}. Endpoint may be unavailable or blocked."
            else
              echo
            fi
          done
