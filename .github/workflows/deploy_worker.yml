name: Worker CI + Protected Production Deploy

on:
  pull_request:
  push:
    branches:
      - Predictive-Model

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate OpenAPI
        run: ruby scripts/validate_openapi.rb

      - name: Run worker smoke tests
        run: node scripts/smoke_worker_node.js

      - name: Run deployment-confidence endpoint smoke test
        run: npm run test:smoke

      - name: Validate market artifacts
        run: node scripts/validate_markets_assets.mjs

      - name: Validate deploy asset bundle paths
        run: node scripts/prepare_deploy_assets.mjs

  deploy_preview:
    if: github.event_name == 'pull_request'
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Prepare deploy asset bundle
        run: node scripts/prepare_deploy_assets.mjs

      - name: Deploy preview worker (optional)
        if: ${{ secrets.CLOUDFLARE_API_TOKEN != '' && secrets.CLOUDFLARE_ACCOUNT_ID != '' }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx --yes wrangler@4 deploy --name construction-ai-preview --config wrangler.toml --assets ./.deploy-assets

      - name: Skip preview deployment
        if: ${{ secrets.CLOUDFLARE_API_TOKEN == '' || secrets.CLOUDFLARE_ACCOUNT_ID == '' }}
        run: echo "Preview deploy skipped (Cloudflare secrets not configured)."

  deploy_production:
    if: github.event_name == 'push' && github.ref == 'refs/heads/Predictive-Model'
    needs: validate
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Prepare deploy asset bundle
        run: node scripts/prepare_deploy_assets.mjs

      - name: Deploy production worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          GIT_SHA: ${{ github.sha }}
        run: npx --yes wrangler@4 deploy --env production --config wrangler.toml --assets ./.deploy-assets
