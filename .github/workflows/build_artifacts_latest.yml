name: Build Artifacts Latest

on:
  workflow_dispatch:
  schedule:
    - cron: "0 14 * * 1-5"

permissions:
  contents: write

jobs:
  build-artifacts:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: scripts/package-lock.json

      - name: Install Node dependencies
        working-directory: scripts
        run: npm ci

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install reportlab jsonschema

      - name: Build JSON artifacts
        run: node scripts/build_artifacts_latest.mjs

      - name: Build Denver checklist PDF
        run: python scripts/build_ci_checklist_pdf.py denver

      - name: Validate JSON schemas
        run: python scripts/validate_json_schemas.py

      - name: Commit artifact changes
        run: |
          if [[ -n "$(git status --porcelain dist/artifacts)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add dist/artifacts
            git commit -m "Update generated artifacts"
            git push origin "${GITHUB_REF_NAME}"
          fi
