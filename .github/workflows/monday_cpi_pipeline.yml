name: Monday CPI Pipeline

on:
  workflow_dispatch:
  schedule:
    - cron: "15 13 * * 1" # Every Monday 13:15 UTC

permissions:
  contents: write

concurrency:
  group: monday-cpi-pipeline-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cpi-refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Validate required paths
        run: |
          mkdir -p artifacts
          test -f scripts/build_dashboard_latest.mjs
          test -f scripts/package.json
          test -f contracts/dashboard_schema.json
          test -f config/regime_history.json

      - name: Install dependencies
        run: npm --prefix scripts install --silent

      - name: Build Monday dashboard snapshot
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          BLS_API_KEY: ${{ secrets.BLS_API_KEY }}
          CENSUS_API_KEY: ${{ secrets.CENSUS_API_KEY }}
          ALPHAVANTAGE_API_KEY: ${{ secrets.ALPHAVANTAGE_API_KEY }}
          SAM_API_KEY: ${{ secrets.SAM_API_KEY }}
          EIA_API_KEY: ${{ secrets.EIA_API_KEY }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          FRED_OBSERVATION_START: "2020-01-01"
          OUT_PATH: "artifacts/dashboard_latest.json"
        run: node scripts/build_dashboard_latest.mjs

      - name: Validate output has CPI + regime history
        run: |
          node - <<'NODE'
          const fs = require('node:fs');
          const dashboard = JSON.parse(fs.readFileSync('artifacts/dashboard_latest.json', 'utf8'));
          const issues = [];

          if (typeof dashboard.cpi?.headline !== 'number') issues.push('Missing cpi.headline');
          if (!Array.isArray(dashboard.cpi?.history) || dashboard.cpi.history.length === 0) {
            issues.push('cpi.history empty');
          }
          if (!Array.isArray(dashboard.regime_history) || dashboard.regime_history.length === 0) {
            issues.push('regime_history empty');
          }

          if (issues.length) {
            console.error('Dashboard validation failed:', issues.join('; '));
            process.exit(1);
          }

          console.log('Validated dashboard_latest.json with CPI and regime history.');
          NODE

      - name: Sync config/regime_history.json
        run: |
          node - <<'NODE'
          const fs = require('node:fs');
          const dashboard = JSON.parse(fs.readFileSync('artifacts/dashboard_latest.json', 'utf8'));

          const next = {
            schema_version: '1.0.0',
            generated_at: dashboard.generated_at,
            source: 'artifacts/dashboard_latest.json',
            retention_policy: {
              active_window_days: 365,
              archive_closed_regimes: true,
              max_entries: 1000
            },
            entries: dashboard.regime_history,
            display: dashboard.regime_history_display
          };

          fs.writeFileSync('config/regime_history.json', JSON.stringify(next, null, 2) + '\n');
          console.log('Updated config/regime_history.json');
          NODE

      - name: Upload CPI artifacts
        uses: actions/upload-artifact@v4
        with:
          name: monday-cpi-artifacts
          path: |
            artifacts/dashboard_latest.json
            dashboard_latest.json
            config/regime_history.json
            contracts/dashboard_schema.json

      - name: Commit and push updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          cp artifacts/dashboard_latest.json dashboard_latest.json
          git add artifacts/dashboard_latest.json dashboard_latest.json config/regime_history.json contracts/dashboard_schema.json

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "Automate Monday CPI refresh and regime history sync"
          git push
