name: iOS Build

on:
  pull_request:
    paths:
      - 'ios/ConstructionAI/**'
      - '.github/workflows/ios_build.yml'
  push:
    branches: [ Predictive-Model ]
    paths:
      - 'ios/ConstructionAI/**'

jobs:
  validate-ios-sources:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Verify Swift sources exist
        run: |
          test -d ios/ConstructionAI
          find ios/ConstructionAI -name '*.swift' | head -n 5
      - name: Build with xcodebuild when project exists
        run: |
          if [ -d ios/ConstructionAI/ConstructionAI.xcodeproj ]; then
            xcodebuild -project ios/ConstructionAI/ConstructionAI.xcodeproj -scheme ConstructionAI -sdk iphonesimulator -destination 'platform=iOS Simulator,name=iPhone 15' build test
          else
            echo 'No xcodeproj found; skipping xcodebuild in this repo layout.'
          fi
