name: Autonomous Dashboard Refresh

on:
  workflow_dispatch:
  schedule:
    - cron: "17 11 * * *"

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh-dashboard:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: scripts/package-lock.json

      - name: Install script dependencies
        working-directory: scripts
        run: npm ci

      - name: Build dashboard from orchestrator
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          CENSUS_API_KEY: ${{ secrets.CENSUS_API_KEY }}
          BLS_API_KEY: ${{ secrets.BLS_API_KEY }}
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
          OPENFIGI_API_KEY: ${{ secrets.OPENFIGI_API_KEY }}
          ALPHAVANTAGE_API_KEY: ${{ secrets.ALPHAVANTAGE_API_KEY }}
        run: node scripts/run_orchestrator.mjs

      - name: Create pull request for data refresh
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore(data): refresh dashboard_latest.json"
          title: "chore(data): autonomous dashboard refresh"
          body: |
            Automated dashboard refresh produced by GitHub Actions.

            - Ran `framework/national_autonomous_run_orchestrator_v1.json`
            - Regenerated `dashboard_latest.json`
            - Opened this PR only when file content changed
          branch: automation/dashboard-refresh
          delete-branch: true
          labels: |
            automation
            data-refresh
